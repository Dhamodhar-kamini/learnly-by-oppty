<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oppty LMS Portal</title>
    <link rel="stylesheet" href="loader.css">
</head>
<body>

    <!-- LMS Module Progression Loader -->
    <div id="lms-loader-wrapper">
        <div class="loader-content">
            
            <!-- Company Logo -->
            <img src="../assets/oppty_newlogo-removebg-preview.png" alt="Oppty Logo" class="lms-logo">

            <!-- Course Progression Timeline -->
            <div class="module-timeline">
                <!-- The background track and the animated fill line -->
                <div class="timeline-line-bg">
                    <div class="timeline-line-fill"></div>
                </div>
                
                <!-- The Curriculum Milestones -->
                <div class="timeline-nodes">
                    
                    <div class="node step-1">
                        <div class="node-wrapper">
                            <div class="node-ripple"></div>
                            <div class="node-circle"></div>
                        </div>
                        <span class="node-text">Learn</span>
                    </div>

                    <div class="node step-2">
                        <div class="node-wrapper">
                            <div class="node-ripple"></div>
                            <div class="node-circle"></div>
                        </div>
                        <span class="node-text">Upgrade</span>
                    </div>

                    <div class="node step-3">
                        <div class="node-wrapper">
                            <div class="node-ripple"></div>
                            <div class="node-circle"></div>
                        </div>
                        <span class="node-text">Grow</span>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Main Content -->
    <div style="padding: 40px; font-family: sans-serif; text-align: center;">
        <h1>Oppty Student Dashboard</h1>
        <p>Your workspace is ready.</p>
    </div>

    <script src="loader.js"></script>
</body>
</html>
